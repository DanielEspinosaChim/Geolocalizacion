name: frontend CI

on:
  push:
    paths:
      - 'frontend/**'
      - '!frontend/legacy/**'
      - '!frontend/graphify-out/**'
  pull_request:
    paths:
      - 'frontend/**'
      - '!frontend/legacy/**'
      - '!frontend/graphify-out/**'

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Instalar dependencias
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (fronteras de arquitectura)
        run: pnpm lint

      - name: Tests
        run: pnpm test

      - name: Build
        run: pnpm build
