apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: geolocalizacion-merida
  namespace: '589026168608'
  annotations:
    run.googleapis.com/ingress: all
    run.googleapis.com/invoker-iam-disabled: 'true'
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '100'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 160
      timeoutSeconds: 300
      serviceAccountName: 589026168608-compute@developer.gserviceaccount.com
      containers:
      - image: us-central1-docker.pkg.dev/videoimet/cloud-run-source-deploy/geolocalizacion-merida:latest
        ports:
        - containerPort: 8080
          name: http1
        resources:
          limits:
            cpu: '2'
            memory: 2Gi
        env:
        - name: GOOGLE_MAPS_API_KEY
          valueFrom:
            secretKeyRef:
              name: GOOGLE_MAPS_API_KEY
              key: latest
  traffic:
  - latestRevision: true
    percent: 100
